<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель квеста "Найди код света"</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-form {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        .login-form h2 {
            color: #764ba2;
            margin-bottom: 30px;
        }
        
        .login-form input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .login-form input:focus {
            border-color: #667eea;
            outline: none;
        }
        
        .login-form button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 20px;
        }
        
        .login-form button:hover {
            transform: scale(1.02);
        }
        
        .admin-panel {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow-x: auto;
        }
        
        .admin-panel h1 {
            color: #764ba2;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 10px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .stat-card h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
        }
        
        .controls {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .controls button {
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .controls button:hover {
            background: #667eea;
            color: white;
        }
        
        .controls button.success {
            border-color: #28a745;
            color: #28a745;
        }
        
        .controls button.success:hover {
            background: #28a745;
            color: white;
        }
        
        .controls button.danger {
            border-color: #dc3545;
            color: #dc3545;
        }
        
        .controls button.danger:hover {
            background: #dc3545;
            color: white;
        }
        
        .filter-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .filter-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        select, input, textarea {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            flex: 1;
            min-width: 200px;
        }
        
        .table-wrapper {
            overflow-x: auto;
            margin: 20px 0;
        }
        
        table {
            width: 100%;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-collapse: collapse;
            min-width: 800px;
        }
        
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: normal;
            white-space: nowrap;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }
        
        tr:hover {
            background: #f8f9ff;
        }
        
        tr.winner-row {
            background: #d4edda;
            font-weight: bold;
            border: 2px solid #28a745;
        }
        
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .badge.success {
            background: #d4edda;
            color: #155724;
        }
        
        .badge.warning {
            background: #fff3cd;
            color: #856404;
        }
        
        .badge.secondary {
            background: #e2e3e5;
            color: #383d41;
        }
        
        .badge.primary {
            background: #cce5ff;
            color: #004085;
        }
        
        .winner-section {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
        
        .winner-display {
            font-size: 24px;
            color: #155724;
            margin: 15px 0;
            padding: 15px;
            background: white;
            border-radius: 5px;
        }
        
        .winner-time {
            font-size: 18px;
            color: #667eea;
            margin-top: 10px;
        }
        
        .winner-stats {
            font-size: 16px;
            color: #28a745;
            margin-top: 5px;
        }
        
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin: 40px 0;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
            flex-wrap: wrap;
        }
        
        .podium-place {
            text-align: center;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            min-width: 150px;
        }
        
        .podium-1 {
            background: gold;
            height: 150px;
        }
        
        .podium-2 {
            background: silver;
            height: 120px;
        }
        
        .podium-3 {
            background: #cd7f32;
            height: 90px;
        }
        
        .podium-name {
            font-weight: bold;
            margin: 10px 0;
        }
        
        .podium-time {
            font-size: 14px;
            opacity: 0.8;
        }
        
        .podium-score {
            font-size: 12px;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .error-msg {
            color: #dc3545;
            text-align: center;
            padding: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        
        .score-cell {
            font-weight: bold;
            text-align: center;
        }
        
        .score-high {
            color: #28a745;
        }
        
        .score-medium {
            color: #ffc107;
        }
        
        .score-low {
            color: #dc3545;
        }
        
        /* Стили для редактора заданий */
        .tasks-editor {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        
        .task-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border: 2px solid #e0e0e0;
            position: relative;
        }
        
        .task-card h3 {
            color: #764ba2;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .task-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .delete-task {
            background: #dc3545;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        
        .delete-task:hover {
            transform: scale(1.05);
            background: #c82333;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
            font-size: 14px;
        }
        
        .form-group input[type="text"],
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .image-preview {
            max-width: 100%;
            max-height: 100px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        
        .answers-list {
            margin-top: 10px;
        }
        
        .answer-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        
        .answer-item input {
            flex: 1;
        }
        
        .remove-answer {
            background: #dc3545;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .add-answer {
            background: #28a745;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .save-tasks {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
            display: block;
            width: 100%;
        }
        
        .add-task-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
            display: inline-block;
        }
        
        .add-task-btn:hover {
            background: #218838;
        }
        
        .image-upload {
            border: 2px dashed #667eea;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .image-upload:hover {
            background: #f0f0ff;
        }
        
        .export-import {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .code-block {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            margin: 15px 0;
            overflow-x: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <!-- Форма входа -->
    <div id="loginForm" class="login-form">
        <h2>🔐 Вход в админ-панель</h2>
        <input type="password" id="password" placeholder="Введите пароль" onkeypress="handleKeyPress(event)">
        <button onclick="checkPassword()">Войти</button>
        <div style="margin-top: 20px; color: #999; font-size: 12px;">
            Пароль по умолчанию: admin123
        </div>
    </div>

    <!-- Админ-панель (изначально скрыта) -->
    <div id="adminPanel" class="admin-panel" style="display: none;">
        <h1>📊 Админ-панель квеста "Найди код света"</h1>
        
        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab active" onclick="showTab('results')">📋 Результаты</button>
            <button class="tab" onclick="showTab('tasks')">✏️ Редактор заданий</button>
            <button class="tab" onclick="showTab('settings')">⚙️ Настройки</button>
        </div>
        
        <!-- Вкладка с результатами -->
        <div id="tab-results" class="tab-content active">
            <h2>📊 Результаты участников</h2>
            
            <!-- Статистика -->
            <div class="stats" id="stats"></div>
            
            <!-- Кнопки управления -->
            <div class="controls">
                <button onclick="exportToCSV()">📥 Экспорт в CSV</button>
                <button onclick="exportToJSON()">📥 Экспорт в JSON</button>
                <button onclick="printResults()">🖨️ Печать</button>
                <button class="success" onclick="determineWinner()">🏆 Определить победителя</button>
                <button class="danger" onclick="clearAllData()">🗑️ Очистить все данные</button>
            </div>
            
            <!-- Секция победителя -->
            <div id="winnerSection" class="winner-section" style="display: none;">
                <h2>🏆 Победитель</h2>
                <div id="winnerDisplay" class="winner-display"></div>
                <div id="winnerTime" class="winner-time"></div>
                <div id="winnerScore" class="winner-stats"></div>
            </div>
            
            <!-- Пьедестал -->
            <div id="podium" class="podium" style="display: none;">
                <div class="podium-place podium-2">
                    <div>🥈 2 место</div>
                    <div class="podium-name" id="secondName"></div>
                    <div class="podium-time" id="secondTime"></div>
                    <div class="podium-score" id="secondScore"></div>
                </div>
                <div class="podium-place podium-1">
                    <div>🥇 1 место</div>
                    <div class="podium-name" id="firstName"></div>
                    <div class="podium-time" id="firstTime"></div>
                    <div class="podium-score" id="firstScore"></div>
                </div>
                <div class="podium-place podium-3">
                    <div>🥉 3 место</div>
                    <div class="podium-name" id="thirdName"></div>
                    <div class="podium-time" id="thirdTime"></div>
                    <div class="podium-score" id="thirdScore"></div>
                </div>
            </div>
            
            <!-- Фильтры -->
            <div class="filter-section">
                <h3>🔍 Фильтры</h3>
                <div class="filter-group">
                    <select id="groupFilter" onchange="applyFilters()">
                        <option value="all">Все группы</option>
                    </select>
                    
                    <select id="ageFilter" onchange="applyFilters()">
                        <option value="all">Все возраста</option>
                    </select>
                    
                    <input type="text" id="searchInput" placeholder="🔎 Поиск по имени..." onkeyup="applyFilters()">
                    
                    <button onclick="sortByScore()">📊 Сортировать по баллам</button>
                    <button onclick="sortByTime()">⏱ Сортировать по времени</button>
                    <button onclick="resetFilters()">🔄 Сбросить фильтры</button>
                </div>
            </div>
            
            <!-- Таблица результатов -->
            <div class="table-wrapper">
                <table id="participantsTable">
                    <thead id="tableHeader">
                        <!-- Заголовки генерируются динамически -->
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="12" class="loading">Загрузка данных...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Вкладка с редактором заданий -->
        <div id="tab-tasks" class="tab-content">
            <h2>✏️ Редактор заданий</h2>
            
            <div class="export-import">
                <button onclick="exportTasks()" class="success">📤 Экспорт заданий</button>
                <button onclick="importTasks()" class="success">📥 Импорт заданий</button>
                <button onclick="resetToDefault()" class="danger">🔄 Сбросить к умолчанию</button>
                <button onclick="addNewTask()" class="add-task-btn">➕ Добавить задание</button>
            </div>
            
            <div class="tasks-editor" id="tasksEditor"></div>
            
            <button onclick="saveTasks()" class="save-tasks">💾 Сохранить все задания</button>
            
            <h3 style="margin-top: 30px;">📋 Предпросмотр заданий</h3>
            <div id="tasksPreview"></div>
        </div>
        
        <!-- Вкладка с настройками -->
        <div id="tab-settings" class="tab-content">
            <h2>⚙️ Настройки квеста</h2>
            
            <div class="form-group">
                <label>Дата и время старта:</label>
                <input type="datetime-local" id="startDateInput">
            </div>
            
            <div class="form-group">
                <label>Пароль администратора:</label>
                <input type="text" id="adminPasswordInput" placeholder="Новый пароль">
            </div>
            
            <div class="form-group">
                <label>Количество заданий (до 10):</label>
                <select id="tasksCountInput">
                    <option value="3">3 задания</option>
                    <option value="4">4 задания</option>
                    <option value="5" selected>5 заданий</option>
                    <option value="6">6 заданий</option>
                    <option value="7">7 заданий</option>
                    <option value="8">8 заданий</option>
                    <option value="9">9 заданий</option>
                    <option value="10">10 заданий</option>
                </select>
            </div>
            
            <button onclick="saveSettings()" class="save-tasks">💾 Сохранить настройки</button>
        </div>
    </div>

    <script>
        // ============ ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ============
        let currentParticipants = [];
        let filteredParticipants = [];
        let sortMode = 'score';
        let currentTab = 'results';
        let tasks = [];
        
        // Пароль для входа
        const ADMIN_PASSWORD = 'admin123';
        
        // ============ ФУНКЦИИ ВХОДА ============
        function checkPassword() {
            const passwordInput = document.getElementById('password');
            const enteredPassword = passwordInput.value;
            
            if (enteredPassword === ADMIN_PASSWORD) {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadAllData();
            } else {
                alert('❌ Неверный пароль! Попробуйте еще раз.');
                passwordInput.value = '';
                passwordInput.focus();
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                checkPassword();
            }
        }
        
        // ============ УПРАВЛЕНИЕ ВКЛАДКАМИ ============
        function showTab(tabName) {
            currentTab = tabName;
            
            // Обновляем классы вкладок
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Обновляем классы содержимого
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(`tab-${tabName}`).classList.add('active');
            
            // Загружаем данные для вкладки
            if (tabName === 'tasks') {
                loadTasks();
            } else if (tabName === 'results') {
                loadParticipants();
            } else if (tabName === 'settings') {
                loadSettings();
            }
        }
        
        // ============ ЗАГРУЗКА ВСЕХ ДАННЫХ ============
        function loadAllData() {
            loadParticipants();
            loadTasks();
            loadSettings();
        }
        
        // ============ РАБОТА С УЧАСТНИКАМИ ============
        function loadParticipants() {
            try {
                const stored = localStorage.getItem('participants');
                currentParticipants = stored ? JSON.parse(stored) : [];
                
                // Получаем актуальное количество заданий из настроек
                const tasksCount = parseInt(localStorage.getItem('tasksCount') || '5');
                
                // Фильтруем только тех, кто прошел все задания
                filteredParticipants = currentParticipants.filter(p => {
                    for (let i = 1; i <= tasksCount; i++) {
                        if (!p.completed || !p.completed[i]) return false;
                    }
                    return true;
                });
                
                // Добавляем поле correctAnswers если его нет
                filteredParticipants = filteredParticipants.map(p => {
                    if (p.correctAnswers === undefined) {
                        let correct = 0;
                        for (let i = 1; i <= tasksCount; i++) {
                            if (p.completed[i] && !(p.skipped && p.skipped[i])) {
                                correct++;
                            }
                        }
                        p.correctAnswers = correct;
                    }
                    return p;
                });
                
                sortByScore();
                updateStats();
                populateFilters();
                displayTable();
            } catch (e) {
                console.error('Error loading data:', e);
            }
        }
        
        function updateStats() {
            const total = filteredParticipants.length;
            const groups = [...new Set(filteredParticipants.map(p => p.group))].length;
            const avgAge = total > 0 
                ? (filteredParticipants.reduce((sum, p) => sum + parseInt(p.age), 0) / total).toFixed(1)
                : 0;
            
            const tasksCount = parseInt(localStorage.getItem('tasksCount') || '5');
            const avgScore = total > 0
                ? (filteredParticipants.reduce((sum, p) => sum + (p.correctAnswers || 0), 0) / total).toFixed(1)
                : 0;
            
            let bestResult = '—';
            if (total > 0 && filteredParticipants[0]) {
                bestResult = `${filteredParticipants[0].correctAnswers || 0}/${tasksCount} (${filteredParticipants[0].time})`;
            }
            
            document.getElementById('stats').innerHTML = `

        function populateFilters() {
            const groupFilter = document.getElementById('groupFilter');
            const ageFilter = document.getElementById('ageFilter');
            
            const currentGroup = groupFilter.value;
            const currentAge = ageFilter.value;
            
            groupFilter.innerHTML = '<option value="all">Все группы</option>';
            ageFilter.innerHTML = '<option value="all">Все возраста</option>';
            
            const groups = [...new Set(filteredParticipants.map(p => p.group))].sort();
            groups.forEach(group => {
                const option = document.createElement('option');
                option.value = group;
                option.textContent = group;
                groupFilter.appendChild(option);
            });
            
            const ages = [...new Set(filteredParticipants.map(p => parseInt(p.age)))].sort((a,b) => a - b);
            ages.forEach(age => {
                const option = document.createElement('option');
                option.value = age;
                option.textContent = age + ' лет';
                ageFilter.appendChild(option);
            });
            
            if (currentGroup && currentGroup !== 'all') groupFilter.value = currentGroup;
            if (currentAge && currentAge !== 'all') ageFilter.value = currentAge;
        }
        
        function applyFilters() {
            const group = document.getElementById('groupFilter').value;
            const age = document.getElementById('ageFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            const tasksCount = parseInt(localStorage.getItem('tasksCount') || '5');
            
            filteredParticipants = currentParticipants.filter(p => {
                for (let i = 1; i <= tasksCount; i++) {
                    if (!p.completed || !p.completed[i]) return false;
                }
                
                if (group !== 'all' && p.group !== group) return false;
                if (age !== 'all' && parseInt(p.age) !== parseInt(age)) return false;
                if (search && !p.name.toLowerCase().includes(search)) return false;
                
                return true;
            });
            
            if (sortMode === 'score') {
                sortByScore();
            } else {
                sortByTime();
            }
            
            displayTable();
            updateStats();
        }
        
        function sortByScore() {
            sortMode = 'score';
            filteredParticipants.sort((a, b) => {
                const scoreA = a.correctAnswers || 0;
                const scoreB = b.correctAnswers || 0;
                
                if (scoreA !== scoreB) {
                    return scoreB - scoreA;
                }
                
                const timeA = a.timeSeconds || Infinity;
                const timeB = b.timeSeconds || Infinity;
                return timeA - timeB;
            });
            displayTable();
        }
        
        function sortByTime() {
            sortMode = 'time';
            filteredParticipants.sort((a, b) => {
                const timeA = a.timeSeconds || Infinity;
                const timeB = b.timeSeconds || Infinity;
                return timeA - timeB;
            });
            displayTable();
        }
        
        function resetFilters() {
            document.getElementById('groupFilter').value = 'all';
            document.getElementById('ageFilter').value = 'all';
            document.getElementById('searchInput').value = '';
            applyFilters();
        }
        
        function getTaskStatus(taskNumber, participant) {
            const tasksCount = parseInt(localStorage.getItem('tasksCount') || '5');
            if (taskNumber > tasksCount) return '<span class="badge secondary">—</span>';
            
            if (!participant.completed || !participant.completed[taskNumber]) {
                return '<span class="badge secondary">⭕</span>';
            }
            if (participant.skipped && participant.skipped[taskNumber]) {
                return '<span class="badge warning">⏩</span>';
            }
            return '<span class="badge success">✅</span>';
        }
        
        function displayTable() {
            const tbody = document.getElementById('tableBody');
            const thead = document.getElementById('tableHeader');
            const tasksCount = parseInt(localStorage.getItem('tasksCount') || '5');
            
            // Динамически создаем заголовки таблицы под количество заданий
            let headerHtml = '<tr>';
            headerHtml += '<th>#</th>';
            headerHtml += '<th>Имя</th>';
            headerHtml += '<th>Возраст</th>';
            headerHtml += '<th>Группа</th>';
            headerHtml += '<th>Время</th>';
            headerHtml += '<th>Правильных ответов</th>';
            for (let i = 1; i <= tasksCount; i++) {
                headerHtml += `<th>Задание ${i}</th>`;
            }
            headerHtml += '<th>Дата</th>';
            headerHtml += '</tr>';
            thead.innerHTML = headerHtml;
            
            if (filteredParticipants.length === 0) {
                tbody.innerHTML = '<tr><td colspan="' + (tasksCount + 7) + '" style="text-align: center; padding: 40px;">Нет участников, прошедших все задания</td></tr>';
                return;
            }
            
            tbody.innerHTML = filteredParticipants.map((p, index) => {
                const date = new Date(p.date);
                const score = p.correctAnswers || 0;
                const isWinner = index === 0 && sortMode === 'score';
                
                let scoreClass = 'score-low';
                if (score >= tasksCount - 1) scoreClass = 'score-high';
                else if (score >= tasksCount - 2) scoreClass = 'score-medium';
                
                let tasksHtml = '';
                for (let i = 1; i <= tasksCount; i++) {
                    tasksHtml += `<td style="text-align: center;">${getTaskStatus(i, p)}</td>`;
                }
                
                return `
                    <tr class="${isWinner ? 'winner-row' : ''}">
                        <td style="text-align: center;"><strong>${index + 1}</strong></td>
                        <td>${p.name} ${isWinner ? '👑' : ''}</td>
                        <td>${p.age}</td>
                        <td>${p.group}</td>
                        <td><strong>${p.time || '—'}</strong></td>
                        <td class="score-cell ${scoreClass}"><strong>${score}/${tasksCount}</strong></td>
                        ${tasksHtml}
                        <td>${date.toLocaleDateString()}<br><small>${date.toLocaleTimeString()}</small></td>
                    </tr>
                `;
            }).join('');
        }
        
        function determineWinner() {
            if (filteredParticipants.length === 0) {
                alert('Нет участников, прошедших все задания!');
                return;
            }
            
            const sorted = [...filteredParticipants].sort((a, b) => {
                const scoreA = a.correctAnswers || 0;
                const scoreB = b.correctAnswers || 0;
                
                if (scoreA !== scoreB) {
                    return scoreB - scoreA;
                }
                
                const timeA = a.timeSeconds || Infinity;
                const timeB = b.timeSeconds || Infinity;
                return timeA - timeB;
            });
            
            const winner = sorted[0];
            const tasksCount = parseInt(localStorage.getItem('tasksCount') || '5');
            
            document.getElementById('winnerSection').style.display = 'block';
            document.getElementById('winnerDisplay').innerHTML = `
                🏆 ${winner.name}<br>
                Группа: ${winner.group} | Возраст: ${winner.age}
            `;
            document.getElementById('winnerTime').innerHTML = `⏱ Время: ${winner.time}`;
            document.getElementById('winnerScore').innerHTML = `📊 Правильных ответов: ${winner.correctAnswers || 0} из ${tasksCount}`;
            
            if (sorted.length >= 3) {
                document.getElementById('podium').style.display = 'flex';
                
                document.getElementById('firstName').textContent = sorted[0].name;
                document.getElementById('firstTime').textContent = sorted[0].time;
                document.getElementById('firstScore').textContent = `${sorted[0].correctAnswers || 0}/${tasksCount}`;
                
                document.getElementById('secondName').textContent = sorted[1].name;
                document.getElementById('secondTime').textContent = sorted[1].time;
                document.getElementById('secondScore').textContent = `${sorted[1].correctAnswers || 0}/${tasksCount}`;
                
                document.getElementById('thirdName').textContent = sorted[2].name;
                document.getElementById('thirdTime').textContent = sorted[2].time;
                document.getElementById('thirdScore').textContent = `${sorted[2].correctAnswers || 0}/${tasksCount}`;
            }
            
            localStorage.setItem('winner', JSON.stringify(winner));
        }

        function deleteTask(index) {
            if (confirm(`Удалить задание "${tasks[index].title}"?`)) {
                tasks.splice(index, 1);

                renderTasksPreview();
                // Обновляем количество заданий в настройках, если удалили последние
                const currentCount = parseInt(localStorage.getItem('tasksCount') || '5');
                if (currentCount > tasks.length) {
                    localStorage.setItem('tasksCount', tasks.length);
                    document.getElementById('tasksCountInput').value = tasks.length;

                            <span class="task-number">${i+1}</span>

                        <div class="form-group">
                            <label>Код (если есть):</label>

        function renderTasksPreview() {
            const container = document.getElementById('tasksPreview');
            
            if (tasks.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px;">Нет заданий для предпросмотра</div>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < tasks.length; i++) {
                const task = tasks[i];
                if (!task) continue;
                
                html += `
                    <div class="task-card">
                        <h4>Задание ${i+1}: ${task.title}</h4>
                        <p>${task.description}</p>
                        ${task.code ? `<div class="code-block"><pre>${task.code}</pre></div>` : ''}
                        ${task.image ? `<img src="${task.image}" class="image-preview">` : ''}
                        <p><strong>Правильные ответы:</strong> ${task.answers.join(', ')}</p>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        function updateTask(index, field, value) {
            if (!tasks[index]) {
                tasks[index] = {answers: []};
            }
            tasks[index][field] = value;
        }
        
        function updateTaskAnswer(taskIndex, answerIndex, value) {
            if (!tasks[taskIndex].answers[answerIndex]) {
                tasks[taskIndex].answers[answerIndex] = '';
            }
            tasks[taskIndex].answers[answerIndex] = value;
        }
        
        function addAnswer(taskIndex) {
            if (!tasks[taskIndex].answers) {
                tasks[taskIndex].answers = [];
            }
            tasks[taskIndex].answers.push('');
            renderTasksEditor();
        }
        
        function removeAnswer(taskIndex, answerIndex) {
            tasks[taskIndex].answers.splice(answerIndex, 1);
            renderTasksEditor();
        }
        
        function changeTaskType(taskIndex, type) {
            tasks[taskIndex].type = type;
        }
        
        function uploadImage(taskIndex) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = function(e) {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(event) {
                    tasks[taskIndex].image = event.target.result;
                    renderTasksEditor();
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        function exportToCSV() {
            const tasksCount = parseInt(localStorage.getItem('tasksCount') || '5');
            const headers = ['Имя', 'Возраст', 'Группа', 'Время', 'Правильных ответов'];
            for (let i = 1; i <= tasksCount; i++) {
                headers.push(`Задание ${i}`);
            }
            headers.push('Дата');
            
            const data = filteredParticipants.map(p => {
                const row = [
                    p.name,
                    p.age,
                    p.group,
                    p.time,
                    p.correctAnswers || 0
                ];
                
                for (let i = 1; i <= tasksCount; i++) {
                    if (!p.completed || !p.completed[i]) {
                        row.push('Не выполнено');
                    } else if (p.skipped && p.skipped[i]) {
                        row.push('Пропущено');
                    } else {
                        row.push('Верно');
                    }
                }
                
                row.push(new Date(p.date).toLocaleString());
                return row;
            });
            
            const csv = [headers, ...data]
                .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
                .join('\n');
            
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `квест_результаты_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }
