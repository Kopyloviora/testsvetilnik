<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квест: Найди код света</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #764ba2;
            text-align: center;
            margin-bottom: 10px;
        }
        .badge {
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 20px;
        }
        
        .timer-container {
            text-align: center;
            margin: 30px 0;
            padding: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 10px;
            color: white;
        }
        
        .timer-title {
            font-size: 18px;
            margin-bottom: 15px;
            opacity: 0.9;
        }
        
        .timer {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .timer-block {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            min-width: 80px;
            backdrop-filter: blur(5px);
        }
        
        .timer-number {
            font-size: 42px;
            font-weight: bold;
            line-height: 1;
        }
        
        .timer-label {
            font-size: 14px;
            margin-top: 5px;
            opacity: 0.8;
        }
        
        .timer-message {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .quest-timer {
            background: #4a90e2;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            display: none;
        }
        
        .quest-timer.active {
            display: block;
        }
        
        .question {
            margin: 30px 0;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: all 0.3s;
            display: none;
        }
        
        .question.active {
            display: block;
        }
        
        .question h3 {
            margin-top: 0;
            color: #555;
        }
        
        .code-block {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            margin: 15px 0;
            overflow-x: auto;
        }
        
        .code-block pre {
            margin: 0;
            white-space: pre-wrap;
        }
        
        .task-image {
            max-width: 100%;
            max-height: 300px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        input[type="text"]:focus {
            border-color: #667eea;
            outline: none;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            flex: 1;
        }
        
        button:hover:not(:disabled) {
            transform: scale(1.05);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .skip-button {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff4757 100%);
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }
        
        .skip-button:hover:not(:disabled) {
            background: linear-gradient(135deg, #ff4757 0%, #ff3838 100%);
        }
        
        .result {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .skip-info {
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-size: 14px;
            border: 1px solid #ffeeba;
        }
        
        .final-form {
            margin-top: 40px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
            display: none;
        }
        
        .final-form.active {
            display: block;
        }
        
        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ddd;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }
        
        .step.completed {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .step.skipped {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff4757 100%);
        }
        
        .step.active {
            background: #ff6b6b;
            transform: scale(1.1);
            box-shadow: 0 0 15px #ff6b6b;
        }
        
        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        
        .warning-message {
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            border: 1px solid #ffeeba;
        }
        
        .completion-message {
            background: #d4edda;
            color: #155724;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            font-size: 18px;
            border: 1px solid #c3e6cb;
        }
        
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            display: block;
        }
        
        .prize-container {
            text-align: center;
            margin: 20px auto;
            padding: 10px;
            max-width: 300px;
        }

        .prize-frame {
            width: 220px;
            height: 220px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.5),
                        0 5px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            padding: 5px;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .prize-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 15px;
            background: white;
            padding: 5px;
            box-sizing: border-box;
        }

        .prize-label {
            margin-top: 15px;
            font-size: 16px;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 8px 25px;
            border-radius: 25px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        .info-message {
            background: #cce5ff;
            color: #004085;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            border: 1px solid #b8daff;
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer"></div>

    <script>
        // ============ ЗАГРУЗКА КОНФИГУРАЦИИ ИЗ URL ============
        (function loadConfigFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const encodedConfig = urlParams.get('config');
            
            if (encodedConfig) {
                try {
                    const config = JSON.parse(decodeURIComponent(encodedConfig));
                    
                    if (config.tasks && Array.isArray(config.tasks)) {
                        localStorage.setItem('questTasks', JSON.stringify(config.tasks));
                        console.log('✅ Загружено заданий из URL:', config.tasks.length);
                    }
                    
                    if (config.tasksCount) {
                        localStorage.setItem('tasksCount', config.tasksCount);
                        console.log('✅ Загружено количество заданий:', config.tasksCount);
                    }
                    
                    if (config.startDate) {
                        localStorage.setItem('questStartDate', config.startDate);
                        console.log('✅ Загружена дата старта');
                    }
                    
                    // Убираем config из URL, чтобы при обновлении страницы не перезагружать
                    const newUrl = window.location.pathname;
                    window.history.replaceState({}, document.title, newUrl);
                    
                } catch(e) {
                    console.error('❌ Ошибка загрузки конфигурации из URL:', e);
                }
            }
        })();
        
        // ============ ЗАГРУЗКА ДАННЫХ ============
        const container = document.getElementById('mainContainer');
        
        // Функция для отладки - показывает что сохранено в localStorage
        function debugStorage() {
            console.log('=== DEBUG INFO ===');
            console.log('tasksCount:', localStorage.getItem('tasksCount'));
            console.log('questTasks:', localStorage.getItem('questTasks'));
            console.log('participants:', localStorage.getItem('participants'));
            console.log('================');
        }
        
        // Загружаем настройки
        let START_DATE = localStorage.getItem('questStartDate') 
            ? new Date(localStorage.getItem('questStartDate')) 
            : new Date();
        START_DATE.setHours(START_DATE.getHours() - 1); // Чтобы квест сразу начинался для теста
        
        // Количество заданий из настроек (по умолчанию 5, максимум 10)
        let TASKS_COUNT = parseInt(localStorage.getItem('tasksCount') || '5');
        if (isNaN(TASKS_COUNT)) TASKS_COUNT = 5;
        if (TASKS_COUNT < 1) TASKS_COUNT = 5;
        if (TASKS_COUNT > 10) TASKS_COUNT = 10;
        
        // Загружаем задания
        let tasks = [];
        const storedTasks = localStorage.getItem('questTasks');
        
        if (storedTasks) {
            tasks = JSON.parse(storedTasks);
            console.log('Загружено заданий из хранилища:', tasks.length);
        } else {
            // Задания по умолчанию (5 штук)
            tasks = [
                {
                    title: "Бесконечный цикл",
                    description: "Программа должна вывести числа от 1 до 5, но зацикливается. Найдите и исправьте ошибку:",
                    code: "for i in range(1, 6):\n    print(i)\n    i = i - 1",
                    answers: ["# i = i - 1", "#i = i - 1", "pass", "continue", "# удалить", "удалить", "# убрать", "убрать"],
                    image: null,
                    type: "text"
                },
                {
                    title: "Ошибка в условии",
                    description: "Функция должна определять чётные числа, но всегда возвращает True. Исправьте ошибку:",
                    code: "def is_even(number):\n    if number % 2 = 0:\n        return True\n    else:\n        return False",
                    answers: ["if number % 2 == 0:", "if number % 2 == 0", "number % 2 == 0", "if (number % 2 == 0):"],
                    image: null,
                    type: "text"
                },
                {
                    title: "Ошибка в списке",
                    description: "Программа должна создать список квадратов чисел, но выдаёт ошибку. Исправьте:",
                    code: "squares = []\nfor i in range(1, 6):\n    squares.append[i**2]",
                    answers: ["squares.append(i**2)", "append(i**2)", "squares.append(i*i)", "append(i*i)"],
                    image: null,
                    type: "text"
                },
                {
                    title: "Бесконечный цикл while",
                    description: "Программа должна вывести числа от 1 до 5, но зацикливается. Исправьте условие цикла:",
                    code: "i = 1\nwhile i > 0:\n    print(i)\n    i += 1\n    if i > 5:\n        break",
                    answers: ["while i <= 5:", "while i < 6:", "while i <=5:", "while i<6:", "i <= 5", "i < 6"],
                    image: null,
                    type: "text"
                },
                {
                    title: "Ошибка в функции",
                    description: "Функция должна возвращать сумму двух чисел, но возвращает None. Исправьте функцию:",
                    code: "def sum_numbers(a, b):\n    result = a + b",
                    answers: ["return result", "return a + b", "return a+b", "return (a + b)", "return"],
                    image: null,
                    type: "text"
                }
            ];
        }
        
        // Корректируем количество заданий: не больше, чем есть в tasks и не больше 10
        if (TASKS_COUNT > tasks.length) {
            TASKS_COUNT = tasks.length;
            localStorage.setItem('tasksCount', TASKS_COUNT);
            console.log('Скорректировано количество заданий до:', TASKS_COUNT);
        }
        
        // Если заданий меньше 1, создаем хотя бы одно
        if (TASKS_COUNT < 1 && tasks.length > 0) {
            TASKS_COUNT = tasks.length;
            localStorage.setItem('tasksCount', TASKS_COUNT);
        }

        // ============ ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ============
        let completedTasks = {};
        let skippedTasks = {};
        let correctAnswersCount = 0;
        let questStartTime = null;
        let questTimerInterval = null;
        let currentTask = 1;
        let allTasksCompleted = false;
        let hasSubmitted = false;

        // Инициализируем объекты для всех заданий
        for (let i = 1; i <= TASKS_COUNT; i++) {
            completedTasks[i] = false;
            skippedTasks[i] = false;
        }

        // ============ ФУНКЦИИ ЗАЩИТЫ ============
        function getUserId() {
            let userId = sessionStorage.getItem('questUserId');
            if (!userId) {
                userId = 'user_' + Math.random().toString(36).substr(2, 9);
                sessionStorage.setItem('questUserId', userId);
            }
            return userId;
        }

        function hasUserCompletedQuest() {
            const userId = getUserId();
            const completedUsers = JSON.parse(localStorage.getItem('completedUsers') || '[]');
            return completedUsers.includes(userId);
        }

        function markUserAsCompleted() {
            const userId = getUserId();
            const completedUsers = JSON.parse(localStorage.getItem('completedUsers') || '[]');
            
            if (!completedUsers.includes(userId)) {
                completedUsers.push(userId);
                localStorage.setItem('completedUsers', JSON.stringify(completedUsers));
            }
        }

        // ============ ОТОБРАЖЕНИЕ СТРАНИЦЫ ============
        function renderPage() {
            if (hasUserCompletedQuest()) {
                showLockMessage();
                return;
            }

            let html = `
                <div class="logo-container">
                    <img src="logo.png" alt="Логотип клуба" class="logo" onerror="this.style.display='none'">
                </div>
                <h1>🔦 Квест: Найди код света</h1>
                
                <div class="prize-container">
                    <div class="prize-frame">
                        <img src="prize.png" alt="3D светильник" class="prize-image" onerror="this.style.display='none'">
                    </div>
                    <div class="prize-label">Главный приз "Светильник"</div>
                </div>
                
                <div class="timer-container" id="timerContainer">
                    <div class="timer-title" id="timerTitle">⏳ До начала квеста осталось:</div>
                    <div class="timer" id="timer">
                        <div class="timer-block">
                            <div class="timer-number" id="days">00</div>
                            <div class="timer-label">дней</div>
                        </div>
                        <div class="timer-block">
                            <div class="timer-number" id="hours">00</div>
                            <div class="timer-label">часов</div>
                        </div>
                        <div class="timer-block">
                            <div class="timer-number" id="minutes">00</div>
                            <div class="timer-label">минут</div>
                        </div>
                        <div class="timer-block">
                            <div class="timer-number" id="seconds">00</div>
                            <div class="timer-label">секунд</div>
                        </div>
                    </div>
                    <div class="timer-message" id="timerMessage" style="display: none;">🎮 Квест начался! Удачи!</div>
                </div>
                
                <div class="quest-timer" id="questTimer">
                    ⏱ Время прохождения: <span id="timeDisplay">00:00</span>
                </div>
                
                <div class="badge" id="startTimeDisplay"></div>
                
                <div class="info-message" id="infoMessage">
                    📋 Всего заданий: ${TASKS_COUNT}
                </div>
                
                <div class="step-indicator" id="stepIndicator">
            `;
            
            // Создаем индикаторы для каждого задания
            for (let i = 1; i <= TASKS_COUNT; i++) {
                html += `<div class="step" id="step${i}">${i}</div>`;
            }
            
            html += `</div>`;
            
            // Генерируем задания
            for (let i = 1; i <= TASKS_COUNT; i++) {
                const task = tasks[i-1] || {title: `Задание ${i}`, description: "Задание не настроено", code: "", answers: [""], image: null};
                
                html += `
                    <div id="task${i}" class="question">
                        <h3>📝 Задание ${i}. ${escapeHtml(task.title)}</h3>
                        <p>${escapeHtml(task.description)}</p>
                        ${task.code ? `<div class="code-block"><pre>${escapeHtml(task.code)}</pre></div>` : ''}
                        ${task.image ? `<img src="${task.image}" class="task-image">` : ''}
                        <input type="text" id="answer${i}" placeholder="Введите ответ" ${i > 1 ? 'disabled' : ''}>
                        <div class="button-group">
                            <button onclick="checkTask(${i})" ${i > 1 ? 'disabled' : ''}>Проверить</button>
                            <button onclick="skipTask(${i})" class="skip-button" id="skip${i}" ${i > 1 ? 'disabled' : ''}>Пропустить</button>
                        </div>
                        <div id="result${i}" class="result"></div>
                    </div>
                `;
            }
            
            html += `
                <!-- Финальная форма -->
                <div id="finalForm" class="final-form">
                    <h3>🎉 Поздравляем! Вы прошли квест!</h3>
                    <p>Ваше время: <strong id="finalTime">00:00</strong></p>
                    <p>Правильных ответов: <strong id="correctCount">0</strong> из ${TASKS_COUNT}</p>
                    <p>Заполните форму для участия в розыгрыше 3D-светильника:</p>
                    <form id="participantForm" onsubmit="submitForm(event)">
                        <input type="text" id="name" placeholder="Ваше имя" required>
                        <div class="error-message" id="nameError">Имя должно содержать хотя бы 2 буквы</div>
                        
                        <input type="number" id="age" placeholder="Ваш возраст" min="5" max="18" required>
                        <div class="error-message" id="ageError">Возраст должен быть от 5 до 18 лет</div>
                        
                        <input type="text" id="group" placeholder="Название группы (например, Роботы-1)" required>
                        <div class="error-message" id="groupError">Укажите название группы</div>
                        
                        <button type="submit" id="submitBtn">Отправить</button>
                    </form>
                </div>
            `;
            
            container.innerHTML = html;
            
            // Отображаем время старта
            document.getElementById('startTimeDisplay').textContent = 
                'Старт: ' + START_DATE.toLocaleString('ru-RU', {
                    day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit'
                });
            
            // Запускаем таймер
            updateStartTimer();
            setInterval(updateStartTimer, 1000);
            
            // Если время старта уже прошло, запускаем квест
            if (new Date() >= START_DATE) {
                setTimeout(() => {
                    if (!questStartTime && !hasUserCompletedQuest()) {
                        startQuest();
                    }
                }, 500);
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function showLockMessage() {
            container.innerHTML = `
                <div class="warning-message">
                    <h2>⚠️ Квест уже пройден</h2>
                    <p>Вы уже проходили этот квест. Повторное прохождение невозможно.</p>
                </div>
            `;
        }

        // ============ ТАЙМЕР ============
        function updateStartTimer() {
            const now = new Date();
            const distance = START_DATE - now;
            
            if (distance <= 0) {
                const timerTitle = document.getElementById('timerTitle');
                const timer = document.getElementById('timer');
                const timerMessage = document.getElementById('timerMessage');
                if (timerTitle) timerTitle.textContent = '🎮 Квест идет!';
                if (timer) timer.style.display = 'none';
                if (timerMessage) timerMessage.style.display = 'block';
                
                if (!questStartTime && !hasUserCompletedQuest()) {
                    startQuest();
                }
                return true;
            } else {
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                
                const daysEl = document.getElementById('days');
                const hoursEl = document.getElementById('hours');
                const minutesEl = document.getElementById('minutes');
                const secondsEl = document.getElementById('seconds');
                
                if (daysEl) daysEl.textContent = days.toString().padStart(2, '0');
                if (hoursEl) hoursEl.textContent = hours.toString().padStart(2, '0');
                if (minutesEl) minutesEl.textContent = minutes.toString().padStart(2, '0');
                if (secondsEl) secondsEl.textContent = seconds.toString().padStart(2, '0');
                
                return false;
            }
        }

        // ============ ЗАПУСК КВЕСТА ============
        function startQuest() {
            if (hasUserCompletedQuest()) {
                showLockMessage();
                return;
            }
            
            questStartTime = Date.now();
            const questTimer = document.getElementById('questTimer');
            if (questTimer) questTimer.classList.add('active');
            
            showTask(1);
            
            const skip1 = document.getElementById('skip1');
            if (skip1) skip1.disabled = false;
            
            if (questTimerInterval) {
                clearInterval(questTimerInterval);
            }
            
            questTimerInterval = setInterval(() => {
                if (questStartTime && !allTasksCompleted) {
                    const elapsed = Math.floor((Date.now() - questStartTime) / 1000);
                    const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
                    const seconds = (elapsed % 60).toString().padStart(2, '0');
                    const timeDisplay = document.getElementById('timeDisplay');
                    if (timeDisplay) timeDisplay.textContent = `${minutes}:${seconds}`;
                }
            }, 1000);
        }

        // ============ УПРАВЛЕНИЕ ЗАДАНИЯМИ ============
        function showTask(taskNumber) {
            document.querySelectorAll('.question').forEach(task => {
                task.classList.remove('active');
            });
            
            const taskEl = document.getElementById(`task${taskNumber}`);
            if (taskEl) taskEl.classList.add('active');
            currentTask = taskNumber;
            
            document.querySelectorAll('.step').forEach((step, index) => {
                step.classList.remove('active');
                if (index + 1 === taskNumber) {
                    step.classList.add('active');
                }
            });
        }

        function updateCorrectCount() {
            correctAnswersCount = 0;
            for (let i = 1; i <= TASKS_COUNT; i++) {
                if (completedTasks[i] && !skippedTasks[i]) {
                    correctAnswersCount++;
                }
            }
        }

        function skipTask(taskNumber) {
            if (hasUserCompletedQuest()) {
                alert('Вы уже проходили этот квест. Повторное прохождение невозможно.');
                return;
            }
            
            if (new Date() < START_DATE) {
                alert('Квест еще не начался! Дождитесь старта.');
                return;
            }
            
            if (!questStartTime) {
                alert('Квест еще не инициализирован. Попробуйте обновить страницу.');
                return;
            }
            
            skippedTasks[taskNumber] = true;
            completedTasks[taskNumber] = true;
            
            const resultDiv = document.getElementById(`result${taskNumber}`);
            if (resultDiv) {
                resultDiv.textContent = "⏩ Задание пропущено. Вы не получите балл за этот вопрос.";
                resultDiv.className = "result skip-info";
                resultDiv.style.display = "block";
            }
            
            const stepEl = document.getElementById(`step${taskNumber}`);
            if (stepEl) stepEl.classList.add('skipped');
            
            updateCorrectCount();
            
            if (taskNumber < TASKS_COUNT) {
                const nextAnswer = document.getElementById(`answer${taskNumber + 1}`);
                const nextButton = document.querySelector(`#task${taskNumber + 1} button`);
                const nextSkip = document.getElementById(`skip${taskNumber + 1}`);
                if (nextAnswer) nextAnswer.disabled = false;
                if (nextButton) nextButton.disabled = false;
                if (nextSkip) nextSkip.disabled = false;
                showTask(taskNumber + 1);
            } else {
                completeQuest();
            }
        }

        function checkTask(taskNumber) {
            if (hasUserCompletedQuest()) {
                alert('Вы уже проходили этот квест. Повторное прохождение невозможно.');
                return;
            }
            
            if (new Date() < START_DATE) {
                alert('Квест еще не начался! Дождитесь старта.');
                return;
            }
            
            if (!questStartTime) {
                alert('Квест еще не инициализирован. Попробуйте обновить страницу.');
                return;
            }
            
            const answerInput = document.getElementById(`answer${taskNumber}`);
            const answer = answerInput ? answerInput.value.trim() : '';
            const task = tasks[taskNumber - 1];
            const resultDiv = document.getElementById(`result${taskNumber}`);
            
            const isCorrect = checkAnswer(answer, task.answers);
            
            if (isCorrect) {
                if (resultDiv) {
                    resultDiv.textContent = "✅ Правильно!";
                    resultDiv.className = "result success";
                    resultDiv.style.display = "block";
                }
                
                completedTasks[taskNumber] = true;
                skippedTasks[taskNumber] = false;
                const stepEl = document.getElementById(`step${taskNumber}`);
                if (stepEl) stepEl.classList.add('completed');
                
                updateCorrectCount();
                
                if (taskNumber < TASKS_COUNT) {
                    const nextAnswer = document.getElementById(`answer${taskNumber + 1}`);
                    const nextButton = document.querySelector(`#task${taskNumber + 1} button`);
                    const nextSkip = document.getElementById(`skip${taskNumber + 1}`);
                    if (nextAnswer) nextAnswer.disabled = false;
                    if (nextButton) nextButton.disabled = false;
                    if (nextSkip) nextSkip.disabled = false;
                    showTask(taskNumber + 1);
                } else {
                    completeQuest();
                }
            } else {
                if (resultDiv) {
                    resultDiv.textContent = "❌ Неправильно. Попробуйте еще раз.";
                    resultDiv.className = "result error";
                    resultDiv.style.display = "block";
                }
            }
        }

        function checkAnswer(userAnswer, correctAnswers) {
            const normalized = userAnswer.toLowerCase().trim();
            
            for (let correct of correctAnswers) {
                if (normalized === correct.toLowerCase().trim()) {
                    return true;
                }
            }
            
            return false;
        }

        function completeQuest() {
            allTasksCompleted = true;
            
            if (questTimerInterval) {
                clearInterval(questTimerInterval);
            }
            
            const timeDisplay = document.getElementById('timeDisplay');
            const finalTime = timeDisplay ? timeDisplay.textContent : '00:00';
            const finalTimeEl = document.getElementById('finalTime');
            const correctCountEl = document.getElementById('correctCount');
            if (finalTimeEl) finalTimeEl.textContent = finalTime;
            if (correctCountEl) correctCountEl.textContent = correctAnswersCount;
            
            const finalForm = document.getElementById('finalForm');
            const stepIndicator = document.getElementById('stepIndicator');
            if (finalForm) finalForm.classList.add('active');
            if (stepIndicator) stepIndicator.style.display = 'none';
        }

        // ============ ОТПРАВКА ФОРМЫ ============
        function validateForm() {
            const name = document.getElementById('name');
            const age = document.getElementById('age');
            const group = document.getElementById('group');
            
            const nameValue = name ? name.value.trim() : '';
            const ageValue = age ? age.value : '';
            const groupValue = group ? group.value.trim() : '';
            
            let isValid = true;
            
            const nameError = document.getElementById('nameError');
            const ageError = document.getElementById('ageError');
            const groupError = document.getElementById('groupError');
            
            if (nameValue.length < 2 || !/^[а-яА-Яa-zA-Z\s-]+$/.test(nameValue)) {
                if (nameError) nameError.style.display = 'block';
                isValid = false;
            } else {
                if (nameError) nameError.style.display = 'none';
            }
            
            if (ageValue < 5 || ageValue > 18 || ageValue === '') {
                if (ageError) ageError.style.display = 'block';
                isValid = false;
            } else {
                if (ageError) ageError.style.display = 'none';
            }
            
            if (groupValue.length < 2) {
                if (groupError) groupError.style.display = 'block';
                isValid = false;
            } else {
                if (groupError) groupError.style.display = 'none';
            }
            
            return isValid;
        }

        function submitForm(event) {
            event.preventDefault();
            
            if (hasSubmitted) {
                alert('Вы уже отправили свои данные!');
                return;
            }
            
            if (!allTasksCompleted) {
                alert('Сначала нужно выполнить все задания!');
                return;
            }
            
            if (!validateForm()) {
                return;
            }
            
            if (hasUserCompletedQuest()) {
                alert('Вы уже проходили этот квест!');
                return;
            }
            
            const name = document.getElementById('name').value.trim();
            const age = document.getElementById('age').value;
            const group = document.getElementById('group').value.trim();
            const time = document.getElementById('timeDisplay').textContent;
            const timeSeconds = Math.floor((Date.now() - questStartTime) / 1000);
            
            const participants = JSON.parse(localStorage.getItem('participants') || '[]');
            
            participants.push({
                name: name,
                age: parseInt(age),
                group: group,
                time: time,
                timeSeconds: timeSeconds,
                correctAnswers: correctAnswersCount,
                totalTasks: TASKS_COUNT,
                date: new Date().toISOString(),
                userId: getUserId(),
                completed: {...completedTasks},
                skipped: {...skippedTasks}
            });
            
            localStorage.setItem('participants', JSON.stringify(participants));
            
            markUserAsCompleted();
            hasSubmitted = true;
            
            alert('🎉 Спасибо за участие! Ваш результат сохранен.');
            
            const submitBtn = document.getElementById('submitBtn');
            const participantForm = document.getElementById('participantForm');
            if (submitBtn) submitBtn.disabled = true;
            if (participantForm) participantForm.innerHTML = '<h3>✅ Спасибо! Ваш результат учтен.</h3>';
            
            const completionMsg = document.createElement('div');
            completionMsg.className = 'completion-message';
            completionMsg.innerHTML = '✅ Вы успешно завершили квест. Повторное прохождение невозможно.';
            document.querySelector('.container').appendChild(completionMsg);
        }

        // ============ ИНИЦИАЛИЗАЦИЯ ============
        window.onload = function() {
            debugStorage();
            console.log('Инициализация квеста. Количество заданий:', TASKS_COUNT);
            console.log('Доступно заданий в tasks:', tasks.length);
            renderPage();
        };
    </script>
</body>
</html>
